name: Build APK

# Builds an Android APK from the deployed PWA using Google's Bubblewrap
# (Trusted Web Activity tooling). Zero native code — the APK is a thin
# Android shell that hosts the live gabriella.vercel.app web app with
# no browser chrome.
#
# Triggers:
#   - Manual dispatch (workflow_dispatch) with an optional host override
#   - Release: when a GitHub release is published, the built APK is
#     attached to the release automatically
#   - Push to main: quick smoke test that the build still works
#
# Outputs:
#   - gabriella-release.apk (unsigned — suitable for sideload and debug)
#   - Uploaded as a workflow artifact for 30 days
#   - Attached to the release when the trigger is a release event
#
# Signing: the workflow generates an ephemeral debug keystore so the
# APK is installable via adb / sideload. For Play Store distribution,
# add a persistent keystore to repo secrets (KEYSTORE_BASE64,
# KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD) and the build will pick
# them up automatically.

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Deployed host embedded in the APK (placeholder ok — the build itself no longer requires a live deployment)"
        required: false
        default: "app.gabriella.example"
      appVersionCode:
        description: "Android versionCode (integer; must increment per Play release)"
        required: false
        default: "1"
      appVersionName:
        description: "Android versionName (human-readable, e.g. 0.7.0)"
        required: false
        default: "0.7.0"
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "twa-manifest.json"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write  # needed to attach the APK to a release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-33 build-tools;33.0.2"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.22.0

      - name: Resolve build inputs
        id: inputs
        run: |
          HOST="${{ github.event.inputs.host }}"
          if [ -z "$HOST" ]; then HOST="app.gabriella.example"; fi
          VERSION_CODE="${{ github.event.inputs.appVersionCode }}"
          if [ -z "$VERSION_CODE" ]; then VERSION_CODE="${GITHUB_RUN_NUMBER}"; fi
          VERSION_NAME="${{ github.event.inputs.appVersionName }}"
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="0.7.0"; fi
          echo "host=$HOST"                      >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE"       >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME"       >> $GITHUB_OUTPUT

      - name: Rewrite twa-manifest for this run
        # host / fullScopeUrl determine the APK's runtime target (what the
        # TWA opens when launched + the Digital Asset Links origin). Those
        # stay as the user-supplied HOST.
        #
        # iconUrl / maskableIconUrl / webManifestUrl are fetched at BUILD
        # time by bubblewrap; we point them at the local http server so
        # the build works with no deployment.
        env:
          HOST:         ${{ steps.inputs.outputs.host }}
          VERSION_CODE: ${{ steps.inputs.outputs.version_code }}
          VERSION_NAME: ${{ steps.inputs.outputs.version_name }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = "twa-manifest.json";
          const m = JSON.parse(fs.readFileSync(path, "utf8"));
          const host = process.env.HOST;
          m.host                 = host;
          m.fullScopeUrl         = `https://${host}/`;
          m.iconUrl              = "http://localhost:8080/icon-512.png";
          m.maskableIconUrl      = "http://localhost:8080/icon-512.png";
          m.webManifestUrl       = "http://localhost:8080/manifest.webmanifest";
          m.appVersionName       = process.env.VERSION_NAME;
          m.appVersionCode       = parseInt(process.env.VERSION_CODE, 10);
          fs.writeFileSync(path, JSON.stringify(m, null, 2));
          console.log("Patched twa-manifest.json for host=" + host);
          NODE

      - name: Stage synthetic PWA manifest + icons and serve on localhost
        # The app isn't deployed yet, so there's no live manifest URL for
        # bubblewrap init to fetch. Instead we materialise a minimal PWA
        # bundle (manifest.webmanifest + two PNG icons at the sizes the
        # manifest advertises) and serve it from a local HTTP server.
        # bubblewrap init is pointed at http://localhost:8080/... and the
        # committed twa-manifest.json is copied over the generated one
        # afterwards, so the final APK still embeds the real host from
        # twa-manifest.json (input `host` above).
        run: |
          mkdir -p pwa-serve
          cat > pwa-serve/manifest.webmanifest <<'JSON'
          {
            "name": "Gabriella",
            "short_name": "Gabriella",
            "description": "A chat interface with memory, presence, and interiority.",
            "start_url": "/",
            "scope": "/",
            "display": "standalone",
            "orientation": "portrait",
            "theme_color": "#08080f",
            "background_color": "#08080f",
            "lang": "en",
            "dir": "ltr",
            "icons": [
              { "src": "/icon-192.png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
              { "src": "/icon-512.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }
            ],
            "categories": ["social", "lifestyle", "productivity"]
          }
          JSON
          # Generate solid-colour PNG placeholders at the advertised sizes.
          # ImageMagick is preinstalled on ubuntu-latest.
          convert -size 192x192 xc:"#08080f" pwa-serve/icon-192.png
          convert -size 512x512 xc:"#08080f" pwa-serve/icon-512.png
          ls -la pwa-serve
          # Background HTTP server on :8080
          cd pwa-serve
          python3 -m http.server 8080 > /tmp/pwa-server.log 2>&1 &
          echo $! > /tmp/pwa-server.pid
          cd ..
          # Wait for the server to answer
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/manifest.webmanifest >/dev/null; then
              echo "Local manifest server is up"
              exit 0
            fi
            echo "Waiting for local server (attempt $i)…"
            sleep 1
          done
          echo "Local server never came up" >&2
          cat /tmp/pwa-server.log >&2 || true
          exit 1

      - name: Resolve or generate signing keystore
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from repo secrets"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore
            echo "keystore_password=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "key_alias=${{ secrets.KEY_ALIAS }}"                  >> $GITHUB_OUTPUT
            echo "key_password=${{ secrets.KEY_PASSWORD }}"             >> $GITHUB_OUTPUT
            echo "signed=true"                                          >> $GITHUB_OUTPUT
          else
            echo "No keystore secrets — generating ephemeral debug keystore"
            keytool -genkeypair \
              -keystore android.keystore \
              -alias android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Gabriella, OU=Dev, O=Gabriella, L=Local, S=Local, C=US"
            echo "keystore_password=android"     >> $GITHUB_OUTPUT
            echo "key_alias=android"             >> $GITHUB_OUTPUT
            echo "key_password=android"          >> $GITHUB_OUTPUT
            echo "signed=false"                  >> $GITHUB_OUTPUT
          fi

      - name: Pre-configure Bubblewrap (skip JDK/SDK prompts)
        run: |
          # Without this file, `bubblewrap init` prompts interactively
          # for JDK + Android SDK locations. In non-TTY CI that aborts
          # the step with exit 130. Seeding ~/.bubblewrap/config.json
          # with the paths that setup-java + setup-android already
          # provisioned lets init + update + build run unattended.
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF
          echo "--- ~/.bubblewrap/config.json ---"
          cat ~/.bubblewrap/config.json

      - name: Bubblewrap init + build
        env:
          BW_KEYSTORE_PASSWORD: ${{ steps.signing.outputs.keystore_password }}
          BW_KEY_PASSWORD:      ${{ steps.signing.outputs.key_password }}
          BW_KEY_ALIAS:         ${{ steps.signing.outputs.key_alias }}
        run: |
          set -e
          mkdir -p twa-build
          cd twa-build
          # bubblewrap init's --manifest flag wants a URL to a Web App
          # Manifest; it ALWAYS fetches from that URL and generates a
          # fresh twa-manifest.json + Android project scaffold. We point
          # it at the local HTTP server started in the previous step so
          # the build runs entirely offline. Our committed
          # twa-manifest.json is then copied over the generated one to
          # preserve custom packageId, colors, version, signing config,
          # AND the real production host — and `update` is run to
          # regenerate the Android project against our overrides.
          # --skipPwaValidation skips the service-worker / icon-size
          # eligibility checks.
          bubblewrap init \
            --manifest "http://localhost:8080/manifest.webmanifest" \
            --skipPwaValidation
          echo "--- init complete; overriding twa-manifest.json with committed version ---"
          cp ../twa-manifest.json ./twa-manifest.json
          bubblewrap update --skipPwaValidation
          # Copy our keystore into the expected location
          cp ../android.keystore ./android.keystore
          echo "--- Generated Android project tree (top-level) ---"
          ls -la
          # Build
          bubblewrap build --skipPwaValidation

      - name: Locate and rename APK
        run: |
          cd twa-build
          # Bubblewrap writes app-release-signed.apk (signed path) or
          # app-release-unsigned.apk (no keystore). Capture whichever.
          APK_PATH=$(find . -maxdepth 3 -name "*.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          echo "Produced APK at $APK_PATH"
          cp "$APK_PATH" ../gabriella-release.apk
          cd ..
          ls -lh gabriella-release.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gabriella-apk
          path: gabriella-release.apk
          retention-days: 30

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: gabriella-release.apk
